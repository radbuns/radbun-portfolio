<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Radhit Desktop</title>

  <link rel="stylesheet" href="style.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body>

  <!-- background -->
  <div class="cloud"></div>
  <div class="particles"></div>

  <main class="desktop">

    <!-- mascot -->
    <img src="Assets/pixel-mascot.png" alt="mascot" class="mascot">

    <!-- hero -->
    <section class="hero">
      <h1>Hi! i'm <span>radbun</span></h1>
      <p>Designer, Video Editor, Developer</p>

      <div class="launcher">

        <button class="app-btn" data-app="about">
          <img src="Assets/About.png">
          <span>about</span>
        </button>

        <button class="app-btn" data-app="projects">
          <img src="Assets/Projects.png">
          <span>projects</span>
        </button>

        <button class="app-btn" data-app="links">
          <img src="Assets/Links.png">
          <span>links</span>
        </button>


      </div>
    </section>

    <!-- dynamic windows -->
    <div id="window-layer"></div>

  </main>
<footer class="footer">
  <p>
    © 2026 Radhit Rabbani —
  </p>
</footer>
  <script src="script.js"></script>
</body>
</html>
